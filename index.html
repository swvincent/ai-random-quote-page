<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Quote</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="quote-card" id="card">
    <span class="open-quote">&ldquo;</span>
    <p id="quote-text"></p>
    <p id="quote-author"></p>
    <p id="quote-source"></p>
    <button class="new-quote-btn">New Quote</button>
  </div>

  <script>
    const textEl   = document.getElementById('quote-text');
    const authorEl = document.getElementById('quote-author');
    const sourceEl = document.getElementById('quote-source');

    let quotes = [];
    let lastIndex = -1;

    function getRandomQuote() {
      let idx;
      do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastIndex);
      lastIndex = idx;
      return quotes[idx];
    }

    function displayQuote(quote) {
      textEl.textContent   = quote.text;
      authorEl.textContent = quote.author;
      sourceEl.textContent = quote.source;
    }

    const quoteEls = [textEl, authorEl, sourceEl];

    function setClass(cls, add) {
      quoteEls.forEach(el => el.classList.toggle(cls, add));
    }

    function nextQuote() {
      setClass('fade-out', true);

      setTimeout(() => {
        setClass('fade-out', false);
        displayQuote(getRandomQuote());
        setClass('fade-in', true);

        setTimeout(() => setClass('fade-in', false), 500);
      }, 300);
    }

    document.querySelector('.new-quote-btn').addEventListener('click', nextQuote);

    fetch('quotes.json')
      .then(r => r.json())
      .then(data => {
        quotes = data;
        displayQuote(getRandomQuote());
      });
  </script>

</body>
</html>
